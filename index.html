<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Y2K TV SEARCH // 2000</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="desktop">
    <div class="window">
      <div class="window-header">
        <div class="window-title">TV_SEARCH.EXE</div>
        <div class="window-controls">
          <span>_</span>
          <span>□</span>
          <span>X</span>
        </div>
      </div>
      <div class="window-body">
        <h1>Y2K TV SEARCH</h1>
        <div class="marquee">
          <p>*** WELCOME TO THE FUTURE OF TELEVISION SEARCH *** POWERED BY TVMAZE API *** EST. 2000 *** NO COOKIES *** NO TRACKING *** JUST PURE DATA ***</p>
        </div>

        <div class="search-container">
          <input type="text" id="search-input" placeholder="ENTER SHOW NAME..." autofocus>
          <button id="search-btn">SEARCH</button>
        </div>

        <div id="results-grid" class="results-grid">
          <!-- Results injected here -->
          <div style="grid-column: 1/-1; text-align: center; font-family: 'Press Start 2P'; font-size: 14px; padding: 40px; color: var(--win-border-dark);">
            READY TO SCAN...
          </div>
        </div>
      </div>
    </div>

    <div class="status-bar">
      <div class="status-field" id="status-field">SYSTEM READY</div>
      <div class="status-field" id="time-field">00:00:00</div>
      <div class="status-field" style="flex: 0 0 100px; text-align: center;">VER. 1.0.0</div>
    </div>

    <div style="text-align: center; margin-top: 20px;">
      <img src="https://web.archive.org/web/20090829141029/http://geocities.com/SiliconValley/Heights/7039/ie_logo.gif" alt="IE Logo" style="height: 31px; margin: 5px;">
      <img src="https://web.archive.org/web/20090829141029/http://geocities.com/SiliconValley/Heights/7039/ns_logo.gif" alt="Netscape Logo" style="height: 31px; margin: 5px;">
      <p style="font-size: 10px; color: white; opacity: 0.5; margin-top: 10px;">BEST VIEWED IN 800x600 RESOLUTION // IE 4.0+</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
